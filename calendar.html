<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<title>内容日历 — Content Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1117;--surface:#1e2130;--surface2:#282d42;--surface3:#333854;
--text:#e0e0e0;--text2:#9ca3af;--accent:#6366f1;--accent2:#818cf8;
--douyin:#ff2d55;--bilibili:#00a1d6;--youtube:#aaa;
--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;
--border:#2a2f45;
}
body{background:var(--bg);color:var(--text);font-family:'LXGW WenKai',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700}
.header h1 span{color:var(--text2);font-weight:400;font-size:14px;margin-left:8px}
.header-actions{display:flex;gap:12px;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.view-toggle button{background:var(--surface2);color:var(--text2);border:none;padding:8px 16px;cursor:pointer;font-size:13px;transition:all .2s}
.view-toggle button.active{background:var(--accent);color:#fff}

/* Layout */
.main-layout{display:flex;gap:0;min-height:calc(100vh - 102px)}
.calendar-area{flex:1;padding:20px;overflow-y:auto}
.sidebar{width:320px;background:var(--surface);border-left:1px solid var(--border);padding:20px;overflow-y:auto}

/* Stats Dashboard */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:700;color:var(--accent2)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card .sub{font-size:11px;color:var(--text2);margin-top:2px}

/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-card h3{font-size:14px;margin-bottom:12px;color:var(--text2)}
.chart-bar{display:flex;align-items:center;margin-bottom:8px;gap:8px}
.chart-bar .bar-label{width:80px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.chart-bar .bar-track{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden}
.chart-bar .bar-fill{height:100%;border-radius:4px;transition:width .3s;display:flex;align-items:center;padding-left:6px;font-size:11px;color:#fff;font-weight:600;min-width:fit-content}
.chart-bar .bar-count{width:30px;font-size:12px;color:var(--text);text-align:right;flex-shrink:0}

/* Calendar Nav */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav h2{font-size:20px;font-weight:600}
.cal-nav-btns{display:flex;gap:8px}
.cal-nav button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav button:hover{background:var(--surface3)}

/* Month Grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-header-cell{background:var(--surface2);padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text2)}
.cal-cell{background:var(--surface);min-height:100px;padding:6px;cursor:pointer;transition:background .15s;position:relative}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
.cal-cell.other-month{opacity:.35}
.cal-cell.selected{background:var(--surface2);box-shadow:inset 0 0 0 2px var(--accent2)}
.cal-date{font-size:13px;font-weight:600;margin-bottom:4px}
.cal-pill{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.cal-pill.douyin{background:rgba(255,45,85,.2);color:var(--douyin);border:1px solid rgba(255,45,85,.3)}
.cal-pill.bilibili{background:rgba(0,161,214,.2);color:var(--bilibili);border:1px solid rgba(0,161,214,.3)}
.cal-pill.youtube{background:rgba(170,170,170,.15);color:var(--youtube);border:1px solid rgba(170,170,170,.3)}

/* Week View */
.week-grid{display:grid;grid-template-columns:80px repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.week-header{background:var(--surface2);padding:10px 6px;text-align:center;font-size:12px;font-weight:600;color:var(--text2)}
.week-header.today-col{color:var(--accent2)}
.week-time-label{background:var(--surface);padding:8px 6px;font-size:11px;color:var(--text2);text-align:right;display:flex;align-items:flex-start;justify-content:flex-end}
.week-cell{background:var(--surface);padding:4px;min-height:48px;cursor:pointer;transition:background .15s;position:relative}
.week-cell:hover{background:var(--surface2)}
.week-cell.optimal{background:rgba(99,102,241,.08)}
.week-cell .cal-pill{font-size:9px;padding:1px 4px}

/* Sidebar */
.sidebar h3{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cadence-item{margin-bottom:12px}
.cadence-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cadence-label .name{color:var(--text)}
.cadence-label .count{color:var(--text2)}
.cadence-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.cadence-fill{height:100%;border-radius:4px;transition:width .3s}
.cadence-fill.met{background:var(--green)}
.cadence-fill.partial{background:var(--yellow)}
.cadence-fill.low{background:var(--orange)}

.sidebar-section{margin-bottom:24px}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal h2 .close-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit}
.form-group textarea{height:70px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.platform-checks{display:flex;gap:12px;flex-wrap:wrap}
.platform-check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
.platform-check input{accent-color:var(--accent)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Checklist */
.checklist{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.checklist h4{font-size:13px;color:var(--text2);margin-bottom:8px;cursor:pointer;user-select:none}
.checklist h4::before{content:'';display:inline-block;width:0;height:0;border-left:5px solid var(--text2);border-top:4px solid transparent;border-bottom:4px solid transparent;margin-right:6px;transition:transform .2s}
.checklist h4.open::before{transform:rotate(90deg)}
.checklist-items{display:none}
.checklist-items.show{display:block}
.check-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--text2);cursor:pointer}
.check-item input{accent-color:var(--green)}
.check-item.done{color:var(--green);text-decoration:line-through}

/* Day detail panel */
.day-detail{margin-top:20px}
.day-detail h3{display:flex;justify-content:space-between;align-items:center}
.content-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.content-card .cc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.content-card .cc-title{font-size:14px;font-weight:600}
.content-card .cc-meta{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.content-card .cc-actions{display:flex;gap:6px}
.platform-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.platform-badge.douyin{background:rgba(255,45,85,.2);color:var(--douyin)}
.platform-badge.bilibili{background:rgba(0,161,214,.2);color:var(--bilibili)}
.platform-badge.youtube{background:rgba(170,170,170,.15);color:var(--youtube)}
.status-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.status-badge.draft{background:rgba(234,179,8,.15);color:var(--yellow)}
.status-badge.recorded{background:rgba(249,115,22,.15);color:var(--orange)}
.status-badge.edited{background:rgba(99,102,241,.15);color:var(--accent2)}
.status-badge.published{background:rgba(34,197,94,.15);color:var(--green)}

/* Donut chart via conic-gradient */
.donut-container{display:flex;align-items:center;gap:16px}
.donut{width:100px;height:100px;border-radius:50%;position:relative;flex-shrink:0}
.donut-hole{position:absolute;top:18px;left:18px;width:64px;height:64px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text)}
.donut-legend{display:flex;flex-direction:column;gap:4px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Mobile */
@media(max-width:900px){
.main-layout{flex-direction:column}
.sidebar{width:100%;border-left:none;border-top:1px solid var(--border)}
.charts-row{grid-template-columns:1fr}
.cal-cell{min-height:70px}
.stats-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
.header{padding:12px 16px}
.header h1{font-size:18px}
.calendar-area{padding:12px}
.cal-cell{min-height:55px;padding:4px}
.cal-pill{font-size:9px;padding:1px 4px}
.stats-row{grid-template-columns:1fr 1fr}
.week-grid{font-size:11px}
}
</style>
</head>

<div class="header">
  <h1><span data-zh="内容日历" data-en="Content Calendar">内容日历</span> <span data-zh="" data-en=""></span></h1>
  <div class="header-actions">
    <div class="lang-toggle" style="display:inline-flex;gap:3px;margin-left:auto;">
  <button onclick="setPageLang('zh')" class="lt-btn lt-active" data-lang="zh" style="background:rgba(240,192,96,0.9);color:#1a1d2e;border:none;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">中文</button>
  <button onclick="setPageLang('en')" class="lt-btn" data-lang="en" style="background:rgba(255,255,255,0.08);color:#9ca0b8;border:1px solid rgba(255,255,255,0.06);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;">EN</button>
  <button onclick="setPageLang('both')" class="lt-btn" data-lang="both" style="background:rgba(255,255,255,0.08);color:#9ca0b8;border:1px solid rgba(255,255,255,0.06);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;">双语</button>
</div>
    <a href="dashboard.html" class="btn btn-secondary btn-sm">&larr; Dashboard</a>
    <div class="view-toggle">
      <button id="btnMonth" class="active" onclick="setView('month')" data-zh="月" data-en="Month">月 Month</button>
      <button id="btnWeek" onclick="setView('week')" data-zh="周" data-en="Week">周 Week</button>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()" data-zh="+ 新建内容" data-en="+ New Content">+ 新建内容</button>
  </div>
</div>

<div class="main-layout">
  <div class="calendar-area">
    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>
    <div class="charts-row" id="chartsRow"></div>

    <!-- Calendar Nav -->
    <div class="cal-nav">
      <div class="cal-nav-btns">
        <button onclick="navMonth(-1)">&lsaquo;</button>
        <button onclick="goToday()" style="width:auto;padding:0 12px;font-size:12px">今天</button>
        <button onclick="navMonth(1)">&rsaquo;</button>
      </div>
      <h2 id="calTitle"></h2>
    </div>

    <!-- Month View -->
    <div id="monthView"></div>

    </div>

    <div class="sidebar-section day-detail" id="dayDetail">
      <h3>
        <span id="dayDetailTitle">选择日期查看详情</span>
        <button class="btn btn-sm btn-primary" onclick="openAddModal()" id="dayAddBtn" style="display:none">+ 添加</button>
      </h3>
      <div id="dayContentList"></div>
    </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>
      <span id="modalTitle">新建内容</span>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </h2>
    <form id="contentForm" onsubmit="saveContent(event)">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>日期 Date</label>
        <input type="date" id="fDate" required>
      </div>
      <div class="form-group">
        <label>标题 Title</label>
        <input type="text" id="fTitle" placeholder="例: 顺炮横车对直车残局解析" required>
      </div>
      <div class="form-group">
        <label>内容类型 Content Type</label>
        <select id="fType" required>
          <option value="puzzle">残局 Puzzle</option>
          <option value="analysis">名局 Famous Game</option>
          <option value="tutorial">教程 Tutorial</option>
          <option value="live">直播 Live Stream</option>
          <option value="series">系列 Series Episode</option>

          <option value="edited">已剪辑 Edited</option>
          <option value="published">已发布 Published</option>
        </select>
      </div>
      <div class="form-group">
        <label>描述/备注 Description</label>

  </div>

<script>
// ========== Data Layer ==========
const STORAGE_KEY = 'xiangqi_calendar_data';
const CHECKLIST_KEY = 'xiangqi_checklists';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function loadChecklists() {
  try { return JSON.parse(localStorage.getItem(CHECKLIST_KEY)) || {}; } catch(e) { return {}; }
}
function saveChecklists(c) { localStorage.setItem(CHECKLIST_KEY, JSON.stringify(c)); }

const CHECKLIST_ITEMS = [
  '脚本撰写 Script written',
  '用Pikafish分析棋局 Position analyzed with Pikafish',
  '视频录制 Video recorded',
  '剪辑完成 (剪映/Premiere) Edited',
  '封面制作 Thumbnail created',
  '标题&描述SEO优化 Title & description SEO-optimized',
  '发布到平台 Published to platform',
  '2小时内回复50+评论 Comments replied (50+ within 2hrs)'
];

const TYPE_LABELS = {puzzle:'残局 Puzzle',analysis:'名局 Famous Game',tutorial:'教程 Tutorial',live:'直播 Live Stream',series:'系列 Series'};
const TYPE_COLORS = {puzzle:'#22c55e',analysis:'#6366f1',tutorial:'#eab308',live:'#ef4444',series:'#f97316'};
const STATUS_LABELS = {draft:'草稿 Draft',recorded:'已录制 Recorded',edited:'已剪辑 Edited',published:'已发布 Published'};
const PLATFORM_LABELS = {douyin:'抖音',bilibili:'B站',youtube:'YouTube'};

// ========== State ==========
let currentView = 'month';
let viewYear, viewMonth; // 0-indexed month
let selectedDate = null; // 'YYYY-MM-DD'

const today = new Date();
viewYear = today.getFullYear();
viewMonth = today.getMonth();

function todayStr() {
  return fmt(today.getFullYear(), today.getMonth(), today.getDate());
}
function fmt(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

// ========== View Toggle ==========
function setView(v) {
  currentView = v;
  document.getElementById('btnMonth').classList.toggle('active', v==='month');
  document.getElementById('btnWeek').classList.toggle('active', v==='week');
  render();
}

function navMonth(dir) {
  if (currentView === 'month') {
    viewMonth += dir;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  } else {
    // week nav: move by 7 days
    const d = new Date(viewYear, viewMonth, 1);
    d.setDate(d.getDate() + dir * 7);
    viewYear = d.getFullYear();
    viewMonth = d.getMonth();
  }
  render();
}

function goToday() {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  selectedDate = todayStr();
  render();
}

// ========== Render ==========
function render() {
  renderStats();
  renderCharts();
  renderCalNav();
  if (currentView === 'month') {
    document.getElementById('monthView').style.display = '';
    document.getElementById('weekView').style.display = 'none';
    renderMonth();
  } else {
    document.getElementById('monthView').style.display = 'none';
    document.getElementById('weekView').style.display = '';
    renderWeek();
  }
  renderCadence();
  renderDayDetail();
}

function renderCalNav() {
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const enMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calTitle').textContent = `${viewYear}年 ${months[viewMonth]} ${enMonths[viewMonth]}`;
}

function renderMonth() {
  const data = loadData();
  const first = new Date(viewYear, viewMonth, 1);
  const startDay = first.getDay(); // 0=Sun
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  const tStr = todayStr();

  const dayNames = ['日 Sun','一 Mon','二 Tue','三 Wed','四 Thu','五 Fri','六 Sat'];
  let html = '<div class="cal-grid">';
  dayNames.forEach(d => html += `<div class="cal-header-cell">${d}</div>`);

  const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    let day, month = viewMonth, year = viewYear, otherMonth = false;
    if (i < startDay) {
      day = prevDays - startDay + i + 1;
      month = viewMonth - 1;
      if (month < 0) { month = 11; year--; }
      otherMonth = true;
    } else if (i >= startDay + daysInMonth) {
      day = i - startDay - daysInMonth + 1;
      month = viewMonth + 1;
      if (month > 11) { month = 0; year++; }
      otherMonth = true;
    } else {
      day = i - startDay + 1;
    }

    const dateStr = fmt(year, month, day);
    const isToday = dateStr === tStr;
    const isSelected = dateStr === selectedDate;
    const cls = ['cal-cell'];
    if (otherMonth) cls.push('other-month');
    if (isToday) cls.push('today');
    if (isSelected) cls.push('selected');

    html += `<div class="${cls.join(' ')}" onclick="selectDate('${dateStr}')">`;
    html += `<div class="cal-date">${day}</div>`;

    // pills for this date
    const items = data.filter(it => it.date === dateStr);
    items.slice(0, 4).forEach(it => {
      it.platforms.forEach(p => {
        html += `<div class="cal-pill ${p}" title="${it.title}">${it.title}</div>`;
      });
    });
    if (items.length > 4) html += `<div style="font-size:10px;color:var(--text2)">+${items.length-4} more</div>`;
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('monthView').innerHTML = html;
}

function renderWeek() {
  const data = loadData();
  const tStr = todayStr();
  // Find the week containing the 1st of the current view month (or today if same month)
  let refDate = (viewYear === today.getFullYear() && viewMonth === today.getMonth()) ? new Date(today) : new Date(viewYear, viewMonth, 1);
  const dayOfWeek = refDate.getDay();
  const weekStart = new Date(refDate);
  weekStart.setDate(weekStart.getDate() - dayOfWeek);

  const dayNames = ['日','一','二','三','四','五','六'];
  const hours = [];
  for (let h = 6; h <= 23; h++) hours.push(h);

  // Optimal posting hours per platform
  const optimalHours = {
    douyin: [19, 20, 21], // evening
    bilibili: [17, 18],   // 5:30 PM area
    youtube: [14, 15, 16, 17, 18, 19, 20] // flexible
  };

  let html = '<div class="week-grid">';
  // Header row
  html += '<div class="week-header"></div>';
  for (let d = 0; d < 7; d++) {
    const dt = new Date(weekStart);
    dt.setDate(dt.getDate() + d);
    const ds = fmt(dt.getFullYear(), dt.getMonth(), dt.getDate());
    const isTd = ds === tStr;
    html += `<div class="week-header${isTd ? ' today-col' : ''}">${dayNames[d]}<br>${dt.getMonth()+1}/${dt.getDate()}</div>`;
  }

  hours.forEach(h => {
    html += `<div class="week-time-label">${String(h).padStart(2,'0')}:00</div>`;
    for (let d = 0; d < 7; d++) {
      const dt = new Date(weekStart);
      dt.setDate(dt.getDate() + d);
      const ds = fmt(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const isOptimal = optimalHours.douyin.includes(h) || optimalHours.bilibili.includes(h);
      html += `<div class="week-cell${isOptimal ? ' optimal' : ''}" onclick="selectDate('${ds}')">`;

      // Show items scheduled at this hour
      const items = data.filter(it => it.date === ds && it.time && parseInt(it.time.split(':')[0]) === h);
      items.forEach(it => {
        it.platforms.forEach(p => {
          html += `<div class="cal-pill ${p}">${it.title.substring(0,6)}</div>`;
        });
      });

      // Show optimal time markers if no content
      if (items.length === 0 && isOptimal) {
        if (optimalHours.douyin.includes(h)) html += '<div style="font-size:9px;color:rgba(255,45,85,.4)">抖音最佳</div>';
        if (optimalHours.bilibili.includes(h) && !optimalHours.douyin.includes(h)) html += '<div style="font-size:9px;color:rgba(0,161,214,.4)">B站最佳</div>';
      }
      html += '</div>';
    }
  });
  html += '</div>';
  document.getElementById('weekView').innerHTML = html;
}

// ========== Stats ==========
function renderStats() {
  const data = loadData();
  const monthItems = data.filter(it => {
    const d = parseDate(it.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
  const published = monthItems.filter(it => it.status === 'published');

  // Streak calculation
  let streak = 0;
  const t = new Date(today);
  while (true) {
    const ds = fmt(t.getFullYear(), t.getMonth(), t.getDate());
    if (data.some(it => it.date === ds && it.status === 'published')) {
      streak++;
      t.setDate(t.getDate() - 1);
    } else break;
  }

  // Cadence compliance: count weeks in this month meeting 5-7 target
  const weeksInMonth = getWeeksInMonth(viewYear, viewMonth);
  let compliantWeeks = 0;
  weeksInMonth.forEach(week => {
    const weekItems = data.filter(it => week.includes(it.date) && it.status === 'published');
    if (weekItems.length >= 5) compliantWeeks++;
  });

  const platformCounts = {douyin:0,bilibili:0,youtube:0};
  published.forEach(it => it.platforms.forEach(p => platformCounts[p]++));

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${published.length}</div><div class="label">本月已发布 Published</div><div class="sub">共 ${monthItems.length} 计划</div></div>
    <div class="stat-card"><div class="val" style="color:var(--douyin)">${platformCounts.douyin}</div><div class="label">抖音 Douyin</div></div>
    <div class="stat-card"><div class="val" style="color:var(--bilibili)">${platformCounts.bilibili}</div><div class="label">B站 Bilibili</div></div>
    <div class="stat-card"><div class="val" style="color:var(--youtube)">${platformCounts.youtube}</div><div class="label">YouTube</div></div>
    <div class="stat-card"><div class="val" style="color:var(--green)">${streak}</div><div class="label">连续发布天数 Streak</div></div>
    <div class="stat-card"><div class="val">${compliantWeeks}/${weeksInMonth.length}</div><div class="label">达标周数 Cadence</div><div class="sub">目标: 5-7 视频/周</div></div>
  `;
}

function getWeeksInMonth(y, m) {
  const weeks = [];
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  let current = new Date(first);
  current.setDate(current.getDate() - current.getDay()); // start of week (Sun)
  while (current <= last) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(current);
      d.setDate(d.getDate() + i);
      if (d.getMonth() === m && d.getFullYear() === y) {
        week.push(fmt(d.getFullYear(), d.getMonth(), d.getDate()));
      }
    }
    if (week.length > 0) weeks.push(week);
    current.setDate(current.getDate() + 7);
  }
  return weeks;
}

function renderCharts() {
  const data = loadData();
  const monthItems = data.filter(it => {
    const d = parseDate(it.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });

  // By type
  const typeCounts = {};
  Object.keys(TYPE_LABELS).forEach(t => typeCounts[t] = 0);
  monthItems.forEach(it => typeCounts[it.type] = (typeCounts[it.type]||0) + 1);
  const totalType = monthItems.length || 1;

  let typeHtml = '';
  Object.keys(TYPE_LABELS).forEach(t => {
    const pct = (typeCounts[t] / totalType * 100).toFixed(0);
    typeHtml += `<div class="chart-bar">
      <div class="bar-label">${TYPE_LABELS[t].split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,2)}%;background:${TYPE_COLORS[t]}">${typeCounts[t]}</div></div>
    </div>`;
  });

  // By platform
  const platCounts = {douyin:0,bilibili:0,youtube:0};
  monthItems.forEach(it => it.platforms.forEach(p => platCounts[p]++));
  const totalPlat = Object.values(platCounts).reduce((a,b)=>a+b,0) || 1;
  const platColors = {douyin:'var(--douyin)',bilibili:'var(--bilibili)',youtube:'var(--youtube)'};

  // Donut
  let angle = 0;
  const segments = [];
  Object.entries(platCounts).forEach(([p, c]) => {
    const deg = (c / totalPlat) * 360;
    segments.push(`${platColors[p]} ${angle}deg ${angle + deg}deg`);
    angle += deg;
  });
  const gradient = segments.length ? segments.join(', ') : 'var(--surface2) 0deg 360deg';

  let platLegend = '';
  Object.entries(platCounts).forEach(([p, c]) => {
    platLegend += `<div class="legend-item"><div class="legend-dot" style="background:${platColors[p]}"></div>${PLATFORM_LABELS[p]}: ${c}</div>`;
  });

  document.getElementById('chartsRow').innerHTML = `
    <div class="chart-card"><h3>内容类型分布 By Type</h3>${typeHtml}</div>
    <div class="chart-card"><h3>平台分布 By Platform</h3>
      <div class="donut-container">
        <div class="donut" style="background:conic-gradient(${gradient})"><div class="donut-hole">${Object.values(platCounts).reduce((a,b)=>a+b,0)}</div></div>
        <div class="donut-legend">${platLegend}</div>
      </div>
    </div>
  `;
}

// ========== Cadence ==========
function renderCadence() {
  const data = loadData();
  // Get current week (Sun-Sat)
  const t = new Date(today);
  const dayOfWeek = t.getDay();
  const weekStart = new Date(t);
  weekStart.setDate(weekStart.getDate() - dayOfWeek);
  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    weekDates.push(fmt(d.getFullYear(), d.getMonth(), d.getDate()));
  }

  const weekItems = data.filter(it => weekDates.includes(it.date));

  const targets = [
    {label:'残局 Puzzle (抖音)', type:'puzzle', target:3, platformFilter:'douyin'},
    {label:'名局分析 Analysis (B站+YT)', type:'analysis', target:2, platformFilter:null},
    {label:'教程 Tutorial', type:'tutorial', target:1, platformFilter:null},
    {label:'直播 Live Stream', type:'live', target:1, platformFilter:null},
  ];

  let html = '';
  let totalTarget = 0, totalDone = 0;
  targets.forEach(t => {
    let items = weekItems.filter(it => it.type === t.type);
    if (t.platformFilter) items = items.filter(it => it.platforms.includes(t.platformFilter));
    const count = items.length;
    totalTarget += t.target;
    totalDone += Math.min(count, t.target);
    const pct = Math.min(count / t.target * 100, 100);
    const cls = pct >= 100 ? 'met' : pct >= 50 ? 'partial' : 'low';
    html += `<div class="cadence-item">
      <div class="cadence-label"><span class="name">${t.label}</span><span class="count">${count}/${t.target}</span></div>
      <div class="cadence-bar"><div class="cadence-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  });

  // Total
  const totalPct = Math.min(totalDone / totalTarget * 100, 100);
  const totalCls = totalPct >= 100 ? 'met' : totalPct >= 50 ? 'partial' : 'low';
  html += `<div class="cadence-item" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
    <div class="cadence-label"><span class="name" style="font-weight:600">总计 Total</span><span class="count">${weekItems.length}/7 目标</span></div>
    <div class="cadence-bar"><div class="cadence-fill ${totalCls}" style="width:${Math.min(weekItems.length/7*100,100)}%"></div></div>
  </div>`;

  document.getElementById('cadenceTracker').innerHTML = html;
}

// ========== Day Detail ==========
function selectDate(ds) {
  selectedDate = ds;
  render();
}

function renderDayDetail() {
  if (!selectedDate) {
    document.getElementById('dayDetailTitle').textContent = '选择日期查看详情';
    document.getElementById('dayContentList').innerHTML = '<p style="color:var(--text2);font-size:13px;margin-top:12px">点击日历中的日期查看当天内容</p>';
    document.getElementById('dayAddBtn').style.display = 'none';
    return;
  }

  const d = parseDate(selectedDate);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dayDetailTitle').textContent = `${selectedDate} ${weekdays[d.getDay()]}`;
  document.getElementById('dayAddBtn').style.display = '';

  const data = loadData();
  const items = data.filter(it => it.date === selectedDate);
  const checklists = loadChecklists();

  if (items.length === 0) {
    document.getElementById('dayContentList').innerHTML = '<p style="color:var(--text2);font-size:13px;margin-top:12px">暂无内容安排</p>';
    return;
  }

  let html = '';
  items.forEach(it => {
    const checkId = it.id;
    const checks = checklists[checkId] || {};

    let platformBadges = it.platforms.map(p => `<span class="platform-badge ${p}">${PLATFORM_LABELS[p]}</span>`).join('');
    let checklistHtml = '<div class="checklist"><h4 onclick="toggleChecklist(this)">发布清单 Publishing Checklist</h4><div class="checklist-items">';
    CHECKLIST_ITEMS.forEach((label, idx) => {
      const checked = checks[idx] ? 'checked' : '';
      const done = checks[idx] ? 'done' : '';
      checklistHtml += `<div class="check-item ${done}"><input type="checkbox" ${checked} onchange="toggleCheck('${checkId}',${idx},this.checked)"><span>${label}</span></div>`;
    });
    checklistHtml += '</div></div>';

    const completedChecks = CHECKLIST_ITEMS.filter((_, i) => checks[i]).length;
    const checkPct = Math.round(completedChecks / CHECKLIST_ITEMS.length * 100);

    html += `<div class="content-card">
      <div class="cc-header">
        <div>
          <div class="cc-title">${it.title}</div>
          <div class="cc-meta">
            <span style="color:${TYPE_COLORS[it.type]}">${TYPE_LABELS[it.type]}</span>
            ${it.time ? `<span>${it.time}</span>` : ''}
            <span class="status-badge ${it.status}">${STATUS_LABELS[it.status]}</span>
          </div>
          <div class="cc-meta">${platformBadges}</div>
        </div>
        <div class="cc-actions">
          <button class="btn btn-sm btn-secondary" onclick="editContent('${it.id}')">编辑</button>
        </div>
      </div>
      ${it.desc ? `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">${it.desc}</div>` : ''}
      <div style="font-size:11px;color:var(--text2)">清单完成 ${checkPct}%</div>
      <div style="height:4px;background:var(--surface);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${checkPct}%;background:${checkPct===100?'var(--green)':'var(--accent)'};border-radius:2px"></div></div>
      ${checklistHtml}
    </div>`;
  });

  document.getElementById('dayContentList').innerHTML = html;
}

function toggleChecklist(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('show');
}

function toggleCheck(itemId, idx, checked) {
  const checklists = loadChecklists();
  if (!checklists[itemId]) checklists[itemId] = {};
  checklists[itemId][idx] = checked;
  saveChecklists(checklists);
  renderDayDetail();
}

// ========== Modal / CRUD ==========
function openAddModal() {
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = '新建内容 New Content';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('contentForm').reset();
  if (selectedDate) document.getElementById('fDate').value = selectedDate;
  document.getElementById('fTime').value = '17:30';
  document.getElementById('modalOverlay').classList.add('show');
}

function editContent(id) {
  const data = loadData();
  const item = data.find(it => it.id === id);
  if (!item) return;
  document.getElementById('editId').value = id;
  document.getElementById('modalTitle').textContent = '编辑内容 Edit Content';
  document.getElementById('deleteBtn').style.display = '';
  document.getElementById('fDate').value = item.date;
  document.getElementById('fTitle').value = item.title;
  document.getElementById('fType').value = item.type;
  document.getElementById('fTime').value = item.time || '17:30';
  document.getElementById('fStatus').value = item.status;
  document.getElementById('fDesc').value = item.desc || '';
  document.getElementById('fDouyin').checked = item.platforms.includes('douyin');
  document.getElementById('fBilibili').checked = item.platforms.includes('bilibili');
  document.getElementById('fYoutube').checked = item.platforms.includes('youtube');
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function saveContent(e) {
  e.preventDefault();
  const platforms = [];
  if (document.getElementById('fDouyin').checked) platforms.push('douyin');
  if (document.getElementById('fBilibili').checked) platforms.push('bilibili');
  if (document.getElementById('fYoutube').checked) platforms.push('youtube');

  if (platforms.length === 0) { alert('请至少选择一个平台'); return; }

  const item = {
    id: document.getElementById('editId').value || ('item_' + Date.now() + '_' + Math.random().toString(36).substr(2,5)),
    date: document.getElementById('fDate').value,
    title: document.getElementById('fTitle').value,
    type: document.getElementById('fType').value,
    platforms: platforms,
    time: document.getElementById('fTime').value,
    status: document.getElementById('fStatus').value,
    desc: document.getElementById('fDesc').value
  };

  let data = loadData();
  const existIdx = data.findIndex(it => it.id === item.id);
  if (existIdx >= 0) {
    data[existIdx] = item;
  } else {
    data.push(item);
  }
  saveData(data);
  selectedDate = item.date;
  closeModal();
  render();
}

function deleteContent() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  if (!confirm('确定删除此内容? Delete this content?')) return;
  let data = loadData();
  data = data.filter(it => it.id !== id);
  saveData(data);
  // Also remove checklist
  const checklists = loadChecklists();
  delete checklists[id];
  saveChecklists(checklists);
  closeModal();
  render();
}

<script>
// Universal language toggle
(function() {
  let pageLang = localStorage.getItem('pageLang') || 'zh';
  
  window.setPageLang = function(lang) {
    pageLang = lang;
    localStorage.setItem('pageLang', lang);
    document.querySelectorAll('.lt-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.style.background = isActive ? 'rgba(240,192,96,0.9)' : 'rgba(255,255,255,0.08)';
      b.style.color = isActive ? '#1a1d2e' : '#9ca0b8';
      b.style.border = isActive ? 'none' : '1px solid rgba(255,255,255,0.06)';
    });
    applyLang();
  };
  
  function applyLang() {
    document.querySelectorAll('[data-zh][data-en]').forEach(el => {
      if (pageLang === 'zh') el.textContent = el.dataset.zh;
      else if (pageLang === 'en') el.textContent = el.dataset.en;
      else el.textContent = el.dataset.zh + ' ' + el.dataset.en;
    });
  }
  
  // Apply on load
  setTimeout(() => {
    setPageLang(pageLang);
  }, 100);
})();
</script>
