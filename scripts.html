<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

<title>解说脚本 — Commentary Scripts</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --surface: #1e2130; --surface2: #282c3e; --surface3: #323752;
  --border: #3a3f55; --text: #e4e4e8; --text2: #9ca3b4; --accent: #4a9eff;
  --accent2: #3a7fd5; --green: #4caf7c; --red: #e05555; --orange: #e8a840;
  --yellow: #f0d060; --purple: #9b7aed;
}
body { font-family: 'LXGW WenKai', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: var(--text); }
input, textarea, select { font-family: inherit; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { color: var(--text2); font-weight: 400; font-size: 15px; }
.back-link { color: var(--text2); font-size: 14px; display: flex; align-items: center; gap: 4px; }
.back-link:hover { color: var(--accent); text-decoration: none; }
.header-actions { display: flex; gap: 8px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface3); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #c04444; }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #3d9066; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Tabs */
.tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
.tab-btn { padding: 12px 20px; font-size: 14px; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Layout */
.main-layout { display: flex; height: calc(100vh - 147px); }
.editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sidebar { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar.collapsed { width: 0; min-width: 0; }

/* Editor toolbar */
.editor-toolbar { padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.editor-toolbar label { font-size: 13px; color: var(--text2); }
.editor-toolbar select { font-size: 13px; padding: 6px 10px; }
.stats-bar { margin-left: auto; display: flex; gap: 16px; font-size: 13px; color: var(--text2); }
.stats-bar .stat { display: flex; align-items: center; gap: 4px; }
.stats-bar .stat-val { color: var(--accent); font-weight: 600; }

/* Sections editor */
.sections-container { flex: 1; overflow-y: auto; padding: 20px 24px; }
.section-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; transition: border-color 0.15s, box-shadow 0.15s; }
.section-block:hover { border-color: var(--surface3); }
.section-block.dragging { opacity: 0.5; border-color: var(--accent); }
.section-block.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2); }
.section-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: grab; user-select: none; }
.section-header:active { cursor: grabbing; }
.drag-handle { color: var(--text2); font-size: 16px; line-height: 1; }
.section-title-input { flex: 1; background: transparent; border: none; font-size: 14px; font-weight: 600; color: var(--text); padding: 2px 4px; }
.section-title-input:focus { background: var(--surface2); border-radius: 4px; }
.section-timing { display: flex; align-items: center; gap: 4px; }
.section-timing input { width: 50px; text-align: center; font-size: 12px; padding: 3px 6px; }
.section-timing span { font-size: 12px; color: var(--text2); }
.section-delete { color: var(--text2); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
.section-delete:hover { color: var(--red); background: rgba(224, 85, 85, 0.1); }
.section-body { padding: 12px 14px; }
.section-body textarea { width: 100%; min-height: 80px; background: transparent; border: 1px solid transparent; border-radius: 4px; font-size: 14px; line-height: 1.7; color: var(--text); padding: 8px; }
.section-body textarea:focus { border-color: var(--border); background: var(--surface2); }

/* Sidebar tabs */
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
.sidebar-tab { flex: 1; padding: 10px 8px; font-size: 12px; text-align: center; color: var(--text2); border-bottom: 2px solid transparent; }
.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

/* Phrases */
.phrase-category { margin-bottom: 16px; }
.phrase-category-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.phrase-item { padding: 6px 10px; font-size: 13px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; line-height: 1.5; transition: background 0.1s; }
.phrase-item:hover { background: var(--surface2); }
.phrase-item .phrase-en { color: var(--text2); font-size: 12px; display: block; }
.phrase-item .phrase-en.hidden { display: none; }

/* Library */
.library-header { padding: 12px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
.library-header input { flex: 1; font-size: 13px; }
.library-header select { font-size: 13px; }
.library-list { flex: 1; overflow-y: auto; }
.library-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.library-item:hover { background: var(--surface2); }
.library-item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.library-item-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; }
.library-item-actions { display: flex; gap: 6px; margin-top: 8px; }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.status-draft { background: rgba(232, 168, 64, 0.15); color: var(--orange); }
.status-final { background: rgba(76, 175, 124, 0.15); color: var(--green); }

/* Tab panels */
.tab-panel { display: none; height: 100%; }
.tab-panel.active { display: flex; flex-direction: column; }
.main-tab-panel { display: none; }
.main-tab-panel.active { display: flex; flex: 1; overflow: hidden; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle { width: 36px; height: 20px; background: var(--surface3); border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
.toggle.on::after { transform: translateX(16px); }
.toggle-label { font-size: 12px; color: var(--text2); }

/* Print view modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 700px; width: 90%; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 16px; }
.modal-close { font-size: 20px; color: var(--text2); padding: 4px 8px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--green); color: #fff; border-radius: 8px; font-size: 14px; z-index: 2000; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateY(0); opacity: 1; }

/* Print view content */
.print-content { font-size: 14px; line-height: 1.8; }
.print-content h2 { font-size: 18px; margin-bottom: 12px; color: var(--accent); }
.print-content h3 { font-size: 15px; margin: 16px 0 8px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.print-content p { margin-bottom: 8px; white-space: pre-wrap; }
.print-content .print-meta { color: var(--text2); font-size: 13px; margin-bottom: 16px; }

/* Sidebar toggle */
.sidebar-toggle { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; }
.sidebar-toggle:hover { background: var(--surface3); }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 260px; }
  .main-layout { height: auto; min-height: calc(100vh - 147px); }
}
@media (max-width: 700px) {
  .sidebar { position: fixed; right: 0; top: 110px; bottom: 0; z-index: 100; width: 300px; box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
  .sidebar.collapsed { width: 0; }
}

@media print {
  body { background: #fff; color: #000; }
  .header, .tab-bar, .editor-toolbar, .sidebar, .modal-overlay { display: none !important; }
  .section-block { border: 1px solid #ccc; break-inside: avoid; }
  .section-header { background: #f5f5f5; }
  .section-body textarea { border: none; }
}
</style>
</head>

// ======== STATE ========
let sections = [];
let currentScriptId = null;
let bilingualMode = false;
let dragSrcIndex = null;

// ======== INIT ========
document.addEventListener('DOMContentLoaded', () => {
  renderPhrases();
  renderSidebarLibrary();
  updateStats();
});

// ======== TEMPLATES ========
function loadTemplate() {
  const key = document.getElementById('templateSelect').value;
  if (!key) return;
  const tpl = TEMPLATES[key];
  if (!confirm('Load template "' + tpl.name + '"? This will replace current content.')) {
    document.getElementById('templateSelect').value = '';
    return;
  }
  currentScriptId = null;
  sections = tpl.sections.map((s, i) => ({
    id: Date.now() + i,
    title: s.title,
    content: bilingualMode ? s.content + '\n---\n' + s.contentEn : s.content,
    time: s.time
  }));
  document.getElementById('scriptTitle').value = '';
  renderSections();
  updateStats();
}

// ======== SECTIONS RENDERING ========
function renderSections() {
  const c = document.getElementById('sectionsContainer');
  c.innerHTML = '';
  sections.forEach((sec, idx) => {
    const block = document.createElement('div');
    block.className = 'section-block';
    block.draggable = true;
    block.dataset.index = idx;

    block.addEventListener('dragstart', onDragStart);
    block.addEventListener('dragover', onDragOver);
    block.addEventListener('dragenter', onDragEnter);
    block.addEventListener('dragleave', onDragLeave);
    block.addEventListener('drop', onDrop);
    block.addEventListener('dragend', onDragEnd);

    block.innerHTML = `
      <div class="section-header">
        <span class="drag-handle">&#9776;</span>
        <input class="section-title-input" value="${escHtml(sec.title)}" data-idx="${idx}" onchange="updateSectionTitle(${idx}, this.value)">
        <div class="section-timing">
          <input type="number" min="0" value="${sec.time}" data-idx="${idx}" onchange="updateSectionTime(${idx}, this.value)" title="Duration in seconds">
          <span>sec</span>
        </div>
        <button class="section-delete" onclick="deleteSection(${idx})" title="Delete section">&times;</button>
      </div>
      <div class="section-body">
        <textarea data-idx="${idx}" oninput="updateSectionContent(${idx}, this.value)" placeholder="Write your script here...">${escHtml(sec.content)}</textarea>
      </div>
    `;
    c.appendChild(block);
  });
  autoResizeAll();
  updateStats();
}

function autoResizeAll() {
  document.querySelectorAll('.section-body textarea').forEach(ta => {
    ta.style.height = 'auto';
    ta.style.height = Math.max(80, ta.scrollHeight) + 'px';
  });
}

function updateSectionTitle(idx, val) { sections[idx].title = val; }
function updateSectionContent(idx, val) {
  sections[idx].content = val;
  const ta = document.querySelectorAll('.section-body textarea')[idx];
  if (ta) { ta.style.height = 'auto'; ta.style.height = Math.max(80, ta.scrollHeight) + 'px'; }
  updateStats();
}
function updateSectionTime(idx, val) { sections[idx].time = parseInt(val) || 0; updateStats(); }

function deleteSection(idx) {
  if (!confirm('Delete this section?')) return;
  sections.splice(idx, 1);
  renderSections();
}

function addSection() {
  sections.push({ id: Date.now(), title: 'New Section', content: '', time: 30 });
  renderSections();
  const container = document.getElementById('sectionsContainer');
  container.scrollTop = container.scrollHeight;
}

// ======== DRAG AND DROP ========
function onDragStart(e) {
  dragSrcIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) {
  e.preventDefault();
  const block = e.currentTarget.closest('.section-block');
  if (block) block.classList.add('drag-over');
}
function onDragLeave(e) {
  const block = e.currentTarget.closest('.section-block');
  if (block) block.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  const targetIndex = parseInt(e.currentTarget.dataset.index);
  if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
    const [moved] = sections.splice(dragSrcIndex, 1);
    sections.splice(targetIndex, 0, moved);
    renderSections();
  }
  e.currentTarget.classList.remove('drag-over');
}
function onDragEnd(e) {
  dragSrcIndex = null;
  document.querySelectorAll('.section-block').forEach(b => {
    b.classList.remove('dragging', 'drag-over');
  });
}

// ======== STATS ========
function updateStats() {
  let totalWords = 0, totalChars = 0, totalTime = 0;
  sections.forEach(s => {
    const text = s.content || '';
    totalChars += text.length;
    // Count Chinese chars + English words
    const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
    const english = text.replace(/[\u4e00-\u9fff]/g, '').trim().split(/\s+/).filter(w => w.length > 0).length;
    totalWords += chinese + english;
    totalTime += s.time;
  });
  document.getElementById('wordCount').textContent = totalWords;
  document.getElementById('charCount').textContent = totalChars;
  const mins = Math.floor(totalTime / 60);
  const secs = totalTime % 60;
  document.getElementById('totalTime').textContent = mins + ':' + String(secs).padStart(2, '0');
}

// ======== BILINGUAL ========
function toggleBilingual() {
  bilingualMode = !bilingualMode;
  document.getElementById('bilingualToggle').classList.toggle('on', bilingualMode);
}

// ======== PHRASES ========
function renderPhrases() {
  const c = document.getElementById('phrasesContent');
  c.innerHTML = '';
  PHRASES.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'phrase-category';
    div.innerHTML = `<div class="phrase-category-title">${escHtml(cat.category)}</div>`;
    cat.items.forEach(item => {
      const p = document.createElement('div');
      p.className = 'phrase-item';
      p.innerHTML = `${escHtml(item.zh)}<span class="phrase-en${bilingualMode ? '' : ' hidden'}">${escHtml(item.en)}</span>`;
      p.onclick = () => insertPhrase(bilingualMode ? item.zh + ' / ' + item.en : item.zh);
      div.appendChild(p);
    });
    c.appendChild(div);
  });
}

function insertPhrase(text) {
  // Find the last focused textarea or the first one
  const textareas = document.querySelectorAll('.section-body textarea');
  let target = null;
  textareas.forEach(ta => { if (ta === document.activeElement) target = ta; });
  if (!target && textareas.length > 0) target = textareas[0];

  if (target) {
    const start = target.selectionStart;
    const end = target.selectionEnd;
    const val = target.value;
    target.value = val.substring(0, start) + text + val.substring(end);
    target.selectionStart = target.selectionEnd = start + text.length;
    target.focus();
    const idx = parseInt(target.dataset.idx);
    if (!isNaN(idx)) updateSectionContent(idx, target.value);
  } else {
    // Copy to clipboard
    navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text));
  }
}

// ======== SAVE / LOAD ========
function getScripts() {
  try { return JSON.parse(localStorage.getItem('chess_scripts') || '[]'); } catch { return []; }
}
function setScripts(arr) { localStorage.setItem('chess_scripts', JSON.stringify(arr)); }

function saveScript(status) {
  const title = document.getElementById('scriptTitle').value.trim();
  if (!title) { alert('Please enter a script title.'); document.getElementById('scriptTitle').focus(); return; }
  const tplVal = document.getElementById('templateSelect').value;
  const script = {
    id: currentScriptId || Date.now().toString(),
    title: title,
    type: tplVal || 'custom',
    status: status,
    date: new Date().toISOString(),
    sections: JSON.parse(JSON.stringify(sections))
  };
  const scripts = getScripts();
  const existIdx = scripts.findIndex(s => s.id === script.id);
  if (existIdx >= 0) scripts[existIdx] = script;
  else scripts.unshift(script);
  setScripts(scripts);
  currentScriptId = script.id;
  showToast('Script saved as ' + status);
  renderSidebarLibrary();
  renderLibrary();
}

function loadScript(id) {
  const scripts = getScripts();
  const s = scripts.find(x => x.id === id);
  if (!s) return;
  currentScriptId = s.id;
  document.getElementById('scriptTitle').value = s.title;
  document.getElementById('templateSelect').value = s.type in TEMPLATES ? s.type : '';
  sections = JSON.parse(JSON.stringify(s.sections));
  renderSections();
  updateStats();
  switchMainTab('editor');
  showToast('Loaded: ' + s.title);
}

function deleteScript(id) {
  if (!confirm('Delete this script permanently?')) return;
  let scripts = getScripts();
  scripts = scripts.filter(s => s.id !== id);
  setScripts(scripts);
  if (currentScriptId === id) {
    currentScriptId = null;
    sections = [];
    document.getElementById('scriptTitle').value = '';
    renderSections();
  }
  renderSidebarLibrary();
  renderLibrary();
  showToast('Script deleted');
}

// ======== LIBRARY RENDERING ========
function renderLibrary() {
  const search = (document.getElementById('librarySearch').value || '').toLowerCase();
  const filterType = document.getElementById('libraryFilter').value;
  const filterStatus = document.getElementById('libraryStatus').value;
  let scripts = getScripts();
  if (search) scripts = scripts.filter(s => s.title.toLowerCase().includes(search));
  if (filterType) scripts = scripts.filter(s => s.type === filterType);
  if (filterStatus) scripts = scripts.filter(s => s.status === filterStatus);

  const c = document.getElementById('libraryContainer');
  if (scripts.length === 0) {
    c.innerHTML = '<div style="text-align:center; color:var(--text2); padding:40px;">No scripts found. Create one in the Editor tab.</div>';
    return;
  }
  c.innerHTML = scripts.map(s => {
    const typeName = TEMPLATES[s.type] ? TEMPLATES[s.type].name : 'Custom';
    const date = new Date(s.date).toLocaleDateString();
    const wordCount = s.sections.reduce((sum, sec) => sum + (sec.content || '').length, 0);
    return `<div class="library-item">
      <div class="library-item-title">${escHtml(s.title)}</div>
      <div class="library-item-meta">
        <span>${typeName}</span>
        <span>${date}</span>
        <span>${wordCount} chars</span>
        <span class="status-badge status-${s.status}">${s.status}</span>
      </div>
      <div class="library-item-actions">
        <button class="btn btn-primary btn-sm" onclick="loadScript('${s.id}')">Open</button>
        <button class="btn btn-danger btn-sm" onclick="deleteScript('${s.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderSidebarLibrary() {
  const search = (document.getElementById('sidebarSearch')?.value || '').toLowerCase();
  let scripts = getScripts();
  if (search) scripts = scripts.filter(s => s.title.toLowerCase().includes(search));

  const c = document.getElementById('sidebarLibraryList');
  if (!c) return;
  if (scripts.length === 0) {
    c.innerHTML = '<div style="text-align:center; color:var(--text2); padding:20px; font-size:13px;">No saved scripts</div>';
    return;
  }
  c.innerHTML = scripts.map(s => {
    const date = new Date(s.date).toLocaleDateString();
    return `<div class="library-item" onclick="loadScript('${s.id}')">
      <div class="library-item-title">${escHtml(s.title)}</div>
      <div class="library-item-meta">
        <span>${date}</span>
        <span class="status-badge status-${s.status}">${s.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ======== TABS ========
function switchMainTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.main-tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if (tab === 'library') renderLibrary();
}

function switchSidebarTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.toggle('active', b.dataset.stab === tab));
  document.querySelectorAll('.sidebar .tab-panel').forEach(p => p.classList.toggle('active', p.id === 'stab-' + tab));
  if (tab === 'saved') renderSidebarLibrary();
  if (tab === 'phrases') renderPhrases();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ======== EXPORT ========
function buildPlainText() {
  const title = document.getElementById('scriptTitle').value || 'Untitled Script';
  const tplVal = document.getElementById('templateSelect').value;
  const typeName = TEMPLATES[tplVal] ? TEMPLATES[tplVal].name : 'Custom';
  let out = title + '\n' + typeName + '\n' + '='.repeat(40) + '\n\n';
  sections.forEach(sec => {
    out += '## ' + sec.title + ' [' + sec.time + 's]\n\n';
    out += (sec.content || '').trim() + '\n\n';
  });
  const totalTime = sections.reduce((s, sec) => s + sec.time, 0);
  out += '='.repeat(40) + '\nTotal time: ' + Math.floor(totalTime/60) + ':' + String(totalTime%60).padStart(2,'0') + '\n';
  return out;
}

function buildMarkdown() {
  const title = document.getElementById('scriptTitle').value || 'Untitled Script';
  const tplVal = document.getElementById('templateSelect').value;
  const typeName = TEMPLATES[tplVal] ? TEMPLATES[tplVal].name : 'Custom';
  let out = '# ' + title + '\n\n';
  out += '**Type:** ' + typeName + '  \n';
  out += '**Date:** ' + new Date().toLocaleDateString() + '\n\n---\n\n';
  sections.forEach(sec => {
    out += '## ' + sec.title + '\n\n';
    out += '*Duration: ' + sec.time + ' seconds*\n\n';
    out += (sec.content || '').trim() + '\n\n---\n\n';
  });
  const totalTime = sections.reduce((s, sec) => s + sec.time, 0);
  out += '**Total estimated time:** ' + Math.floor(totalTime/60) + ':' + String(totalTime%60).padStart(2,'0') + '\n';
  return out;
}

function exportClipboard() {
  navigator.clipboard.writeText(buildPlainText()).then(() => showToast('Copied to clipboard'));
}

function exportTxt() {
  downloadFile(buildPlainText(), (document.getElementById('scriptTitle').value || 'script') + '.txt', 'text/plain');
}

function exportMd() {
  downloadFile(buildMarkdown(), (document.getElementById('scriptTitle').value || 'script') + '.md', 'text/markdown');
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type: type + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded: ' + filename);
}

// ======== PRINT VIEW ========
function showPrintView() {
  const title = document.getElementById('scriptTitle').value || 'Untitled Script';
  const tplVal = document.getElementById('templateSelect').value;
  const typeName = TEMPLATES[tplVal] ? TEMPLATES[tplVal].name : 'Custom';
  const totalTime = sections.reduce((s, sec) => s + sec.time, 0);

  let html = '<h2>' + escHtml(title) + '</h2>';
  html += '<div class="print-meta">' + escHtml(typeName) + ' | ' + new Date().toLocaleDateString() + ' | Est. ' + Math.floor(totalTime/60) + ':' + String(totalTime%60).padStart(2,'0') + '</div>';

  sections.forEach(sec => {
    html += '<h3>' + escHtml(sec.title) + ' <span style="font-weight:normal;color:var(--text2);">(' + sec.time + 's)</span></h3>';
    html += '<p>' + escHtml(sec.content || '(empty)') + '</p>';
  });

  document.getElementById('printContent').innerHTML = html;
  document.getElementById('printModal').classList.add('show');
}

function closePrintModal() {
  document.getElementById('printModal').classList.remove('show');
}

// ======== UTILS ========
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('printModal').addEventListener('click', function(e) {
  if (e.target === this) closePrintModal();
});
</script>
<script>
// Universal language toggle
(function() {
  let pageLang = localStorage.getItem('pageLang') || 'zh';
  
  window.setPageLang = function(lang) {
    pageLang = lang;
    localStorage.setItem('pageLang', lang);
    document.querySelectorAll('.lt-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.style.background = isActive ? 'rgba(240,192,96,0.9)' : 'rgba(255,255,255,0.08)';
      b.style.color = isActive ? '#1a1d2e' : '#9ca0b8';
      b.style.border = isActive ? 'none' : '1px solid rgba(255,255,255,0.06)';
    });
    applyLang();
  };
  
  function applyLang() {
    document.querySelectorAll('[data-zh][data-en]').forEach(el => {
      if (pageLang === 'zh') el.textContent = el.dataset.zh;
      else if (pageLang === 'en') el.textContent = el.dataset.en;
      else el.textContent = el.dataset.zh + ' ' + el.dataset.en;
    });
  }
  
  // Apply on load
  setTimeout(() => {
    setPageLang(pageLang);
  }, 100);
})();
</script>
