<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
  <title>Founder's Dashboard — 象棋频道</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #161822;
      --bg3: #1c1f2e;
      --surface: #1e2130;
      --surface2: #252840;
      --border: #2a2d42;
      --border-hover: #3a3d5c;
      --text: #e4e4eb;
      --text2: #9ca0b8;
      --text3: #6b6f8a;
      --red: #ef4444;
      --red-dim: #7f1d1d;
      --red-glow: rgba(239,68,68,0.15);
      --gold: #eab308;
      --gold-dim: #713f12;
      --gold-glow: rgba(234,179,8,0.12);
      --green: #22c55e;
      --green-dim: #14532d;
      --green-glow: rgba(34,197,94,0.12);
      --blue: #3b82f6;
      --blue-dim: #1e3a5f;
      --blue-glow: rgba(59,130,246,0.12);
      --purple: #a855f7;
      --purple-dim: #3b0764;
      --purple-glow: rgba(168,85,247,0.12);
      --cyan: #06b6d4;
      --orange: #f97316;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'LXGW WenKai', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1030 0%, #0f1117 50%, #0a1628 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 32px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--red), #b91c1c);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 16px rgba(239,68,68,0.3);
    }
    .header-title h1 { font-size: 1.5em; font-weight: 800; letter-spacing: -0.5px; }
    .header-title p { font-size: 0.82em; color: var(--text3); }
    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.82em;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--surface2); border-color: var(--border-hover); }
    .btn-red { background: var(--red); border-color: var(--red); color: #fff; }
    .btn-red:hover { background: #dc2626; }

    /* ── Tools nav ── */
    .tools-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tool-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      text-decoration: none;
      font-size: 0.82em;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
    }
    .tool-link:hover { background: var(--surface2); border-color: var(--border-hover); color: var(--text); transform: translateY(-1px); }
    .tool-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9em; font-weight: 800;
      flex-shrink: 0;
      color: #fff;
    }
    .ti-board { background: linear-gradient(135deg, #b45309, #d97706); }
    .ti-games { background: linear-gradient(135deg, #b91c1c, #ef4444); }
    .ti-cal { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
    .ti-script { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .ti-stats { background: linear-gradient(135deg, #047857, #10b981); }
    .ti-report { background: linear-gradient(135deg, #b45309, #eab308); }

    /* ── Stats strip ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-align: center;
      transition: all 0.2s;
    }
    .stat:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .stat-value {
      font-size: 1.6em;
      font-weight: 900;
      line-height: 1.2;
    }
    .stat-label { font-size: 0.72em; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .c-red { color: var(--red); }
    .c-green { color: var(--green); }
    .c-gold { color: var(--gold); }
    .c-blue { color: var(--blue); }
    .c-purple { color: var(--purple); }
    .c-cyan { color: var(--cyan); }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 160px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
      position: sticky;
      top: 160px;
    }
    .sidebar-section { margin-bottom: 8px; }
    .sidebar-heading {
      padding: 8px 20px;
      font-size: 0.68em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text3);
      font-weight: 700;
    }
    .folder-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 20px;
      border: none;
      background: none;
      color: var(--text2);
      font-size: 0.88em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .folder-btn:hover { background: var(--surface); color: var(--text); }
    .folder-btn.active { background: var(--surface2); color: var(--text); border-right: 3px solid var(--red); }
    .folder-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85em; flex-shrink: 0;
    }
    .fi-red { background: var(--red-glow); color: var(--red); }
    .fi-blue { background: var(--blue-glow); color: var(--blue); }
    .fi-green { background: var(--green-glow); color: var(--green); }
    .fi-gold { background: var(--gold-glow); color: var(--gold); }
    .fi-purple { background: var(--purple-glow); color: var(--purple); }
    .fi-cyan { background: rgba(6,182,212,0.12); color: var(--cyan); }
    .folder-meta { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .folder-count {
      font-size: 0.72em;
      background: var(--surface);
      padding: 2px 7px;
      border-radius: 10px;
      color: var(--text3);
      font-weight: 600;
    }
    .folder-progress-mini {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .folder-progress-mini-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Content area ── */
    .content {
      padding: 28px 32px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .content-header h2 {
      font-size: 1.3em;
      font-weight: 800;
    }
    .content-header h2 small { font-size: 0.55em; color: var(--text3); font-weight: 400; display: block; margin-top: 2px; }
    .filter-bar { display: flex; gap: 6px; }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text3);
      font-size: 0.78em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text2); }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── Plan cards ── */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.2s;
    }
    .plan-card:hover { border-color: var(--border-hover); }
    .plan-card.expanded { box-shadow: var(--shadow); }

    .plan-header {
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
    }
    .plan-header:hover { background: rgba(255,255,255,0.02); }

    .plan-chevron {
      font-size: 0.7em;
      color: var(--text3);
      transition: transform 0.25s;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }
    .plan-card.expanded .plan-chevron { transform: rotate(90deg); }

    .plan-priority {
      width: 4px;
      height: 32px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .priority-critical { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }
    .priority-high { background: var(--orange); }
    .priority-medium { background: var(--gold); }
    .priority-low { background: var(--blue); }

    .plan-info { flex: 1; min-width: 0; }
    .plan-title { font-weight: 700; font-size: 0.95em; margin-bottom: 2px; }
    .plan-desc { font-size: 0.78em; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .plan-stats { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .plan-progress-wrap { display: flex; align-items: center; gap: 8px; }
    .plan-progress-bar {
      width: 80px; height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .plan-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .plan-progress-text { font-size: 0.78em; font-weight: 700; min-width: 32px; text-align: right; }
    .plan-task-count { font-size: 0.72em; color: var(--text3); white-space: nowrap; }

    .plan-status {
      font-size: 0.68em;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .status-not_started { background: var(--surface2); color: var(--text3); }
    .status-in_progress { background: var(--blue-glow); color: var(--blue); }
    .status-completed { background: var(--green-glow); color: var(--green); }

    /* ── Task list (expandable) ── */
    .plan-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .plan-card.expanded .plan-body { max-height: 2000px; }

    .task-list {
      padding: 0 20px 16px 20px;
      border-top: 1px solid var(--border);
    }
    .task-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 8px;
    }
    .task-group-header span { font-size: 0.75em; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: opacity 0.2s;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item.done { opacity: 0.45; }

    .task-checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
      background: none;
    }
    .task-checkbox:hover { border-color: var(--green); background: var(--green-glow); }
    .task-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .task-checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .task-text { font-size: 0.88em; flex: 1; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }

    .task-priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 7px;
    }
    .tpd-critical { background: var(--red); }
    .tpd-high { background: var(--orange); }
    .tpd-medium { background: var(--gold); }
    .tpd-low { background: var(--blue); }

    /* ── Add task inline ── */
    .add-task-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 4px;
    }
    .add-task-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.85em;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-task-input::placeholder { color: var(--text3); }
    .add-task-input:focus { border-color: var(--red); }
    .add-task-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text2);
      font-size: 0.82em;
      outline: none;
    }
    .add-task-btn {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      background: var(--red);
      border: none;
      color: #fff;
      font-size: 0.82em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-task-btn:hover { background: #dc2626; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
    }
    .empty-state .empty-icon { font-size: 3em; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { color: var(--text2); margin-bottom: 8px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        max-height: none;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .sidebar-section { display: contents; }
      .sidebar-heading { display: none; }
      .folder-btn { width: auto; padding: 8px 14px; border-radius: var(--radius-sm); }
      .folder-btn.active { border-right: none; background: var(--red); color: #fff; border-radius: var(--radius-sm); }
      .folder-meta { display: none; }
      .content { max-height: none; padding: 20px 16px; }
      .header { padding: 20px 16px 16px; }
      .stats-strip { grid-template-columns: repeat(3, 1fr); }
      .plan-stats { flex-direction: column; align-items: flex-end; gap: 6px; }
    }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .plan-card { animation: fadeIn 0.3s ease; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════
//  DATA LAYER — plans loaded from embedded JSON
//  (mirrors the plans/ folder structure)
// ═══════════════════════════════════════════

const FOLDERS = [
  { id: 'all',        label: 'All Plans',           icon: '全', iconClass: 'fi-red'    },
  { id: 'content',    label: '内容 Content',        icon: '录', iconClass: 'fi-red'    },
  { id: 'platform',   label: '平台 Platforms',      icon: '台', iconClass: 'fi-blue'   },
  { id: 'tech-setup', label: '技术 Tech Setup',     icon: '技', iconClass: 'fi-green'  },
  { id: 'growth',     label: '增长 Growth',         icon: '涨', iconClass: 'fi-gold'   },
  { id: 'revenue',    label: '变现 Revenue',        icon: '¥', iconClass: 'fi-purple' },
  { id: 'community',  label: '社群 Community',      icon: '群', iconClass: 'fi-cyan'   },
];

const STORAGE_KEY = 'xiangqi-dashboard-plans';
let plans = [];
let activeFolder = 'all';
let activeFilter = 'all'; // all | todo | done

function loadPlans() {
  const savedVersion = localStorage.getItem(STORAGE_KEY + '_version');
  if (savedVersion && parseInt(savedVersion) >= PLAN_DATA_VERSION) {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { plans = JSON.parse(saved); return; } catch(e) {}
    }
  }
  // Version mismatch or no data — load fresh from defaults
  plans = JSON.parse(JSON.stringify(DEFAULT_PLANS));
  savePlans();
  localStorage.setItem(STORAGE_KEY + '_version', String(PLAN_DATA_VERSION));
}

function savePlans() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));
}

function resetPlans() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadPlans();
  render();
}

// ═══════════════════════════════════════════
//  COMPUTED
// ═══════════════════════════════════════════

function getPlanProgress(plan) {
  if (!plan.tasks.length) return 0;
  const done = plan.tasks.filter(t => t.done).length;
  return Math.round((done / plan.tasks.length) * 100);
}

function getPlanStatus(plan) {
  const p = getPlanProgress(plan);
  if (p === 100) return 'completed';
  if (p > 0) return 'in_progress';
  return 'not_started';
}

function getFolderStats(folderId) {
  const fp = folderId === 'all' ? plans : plans.filter(p => p.folder === folderId);
  const totalTasks = fp.reduce((s, p) => s + p.tasks.length, 0);
  const doneTasks = fp.reduce((s, p) => s + p.tasks.filter(t => t.done).length, 0);
  return { plans: fp.length, totalTasks, doneTasks, progress: totalTasks ? Math.round((doneTasks/totalTasks)*100) : 0 };
}

function getGlobalStats() {
  const totalPlans = plans.length;
  const totalTasks = plans.reduce((s, p) => s + p.tasks.length, 0);
  const doneTasks = plans.reduce((s, p) => s + p.tasks.filter(t => t.done).length, 0);
  const inProgress = plans.filter(p => getPlanStatus(p) === 'in_progress').length;
  const completed = plans.filter(p => getPlanStatus(p) === 'completed').length;
  const critical = plans.reduce((s, p) => s + p.tasks.filter(t => !t.done && t.priority === 'critical').length, 0);
  return { totalPlans, totalTasks, doneTasks, inProgress, completed, critical, progress: totalTasks ? Math.round((doneTasks/totalTasks)*100) : 0 };
}

function getFilteredPlans() {
  let fp = activeFolder === 'all' ? [...plans] : plans.filter(p => p.folder === activeFolder);
  // sort: critical first, then high, medium, low; within same priority, in_progress first
  const priOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  const statusOrder = { in_progress: 0, not_started: 1, completed: 2 };
  fp.sort((a,b) => {
    const sa = statusOrder[getPlanStatus(a)] ?? 1;
    const sb = statusOrder[getPlanStatus(b)] ?? 1;
    if (sa !== sb) return sa - sb;
    return (priOrder[a.priority]??3) - (priOrder[b.priority]??3);
  });
  return fp;
}

//  RENDER
// ═══════════════════════════════════════════

function render() {
  renderStats();
  renderSidebar();
  renderContent();
}

function renderStats() {
  const s = getGlobalStats();
  const progressColor = s.progress >= 75 ? 'c-green' : s.progress >= 40 ? 'c-gold' : 'c-red';
  document.getElementById('statsStrip').innerHTML = `
    <div class="stat"><div class="stat-value ${progressColor}">${s.progress}%</div><div class="stat-label">Overall Progress</div></div>
    <div class="stat"><div class="stat-value c-blue">${s.totalPlans}</div><div class="stat-label">Total Plans</div></div>
    <div class="stat"><div class="stat-value c-cyan">${s.totalTasks}</div><div class="stat-label">Total Tasks</div></div>
    <div class="stat"><div class="stat-value c-green">${s.doneTasks}</div><div class="stat-label">Completed</div></div>
    <div class="stat"><div class="stat-value c-gold">${s.inProgress}</div><div class="stat-label">In Progress</div></div>
    <div class="stat"><div class="stat-value c-red">${s.critical}</div><div class="stat-label">Critical Left</div></div>
  `;
}

function renderSidebar() {
  let html = '<div class="sidebar-section"><div class="sidebar-heading">Folders</div>';
  FOLDERS.forEach(f => {
    const stats = getFolderStats(f.id);
    const progressColor = stats.progress >= 75 ? 'var(--green)' : stats.progress >= 40 ? 'var(--gold)' : 'var(--red)';
    html += `
      <button class="folder-btn ${activeFolder === f.id ? 'active' : ''}" onclick="setFolder('${f.id}')">
        <div class="folder-icon ${f.iconClass}">${f.icon}</div>
        <span>${f.label}</span>
        <div class="folder-meta">
          <div class="folder-progress-mini"><div class="folder-progress-mini-fill" style="width:${stats.progress}%;background:${progressColor}"></div></div>
          <span class="folder-count">${stats.doneTasks}/${stats.totalTasks}</span>
        </div>
      </button>`;
  });
  html += '</div>';
  html += `<div class="sidebar-section" style="padding:16px 20px;border-top:1px solid var(--border);margin-top:8px;">
    <button class="btn" style="width:100%;margin-bottom:6px;" onclick="resetPlans()">Reset All Progress</button>
  </div>`;
  document.getElementById('sidebar').innerHTML = html;
}

function renderContent() {
  const fp = getFilteredPlans();
  const folderInfo = FOLDERS.find(f => f.id === activeFolder);
  let html = `
    <div class="content-header">
      <h2>${folderInfo.label} <small>${fp.length} plan${fp.length!==1?'s':''} · ${getFolderStats(activeFolder).totalTasks} tasks</small></h2>
      <div class="filter-bar">
        <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
        <button class="filter-btn ${activeFilter==='todo'?'active':''}" onclick="setFilter('todo')">To Do</button>
        <button class="filter-btn ${activeFilter==='done'?'active':''}" onclick="setFilter('done')">Done</button>
      </div>
    </div>`;

  if (!fp.length) {
    html += `<div class="empty-state"><div class="empty-icon">棋</div><h3>No plans in this folder</h3><p>Plans will appear here when added.</p></div>`;
  }

  fp.forEach(plan => {
    const progress = getPlanProgress(plan);
    const status = getPlanStatus(plan);
    const progressColor = progress >= 75 ? 'var(--green)' : progress >= 40 ? 'var(--gold)' : progress > 0 ? 'var(--blue)' : 'var(--text3)';
    const doneTasks = plan.tasks.filter(t => t.done).length;

    let tasks = plan.tasks;
    if (activeFilter === 'todo') tasks = tasks.filter(t => !t.done);
    if (activeFilter === 'done') tasks = tasks.filter(t => t.done);

    html += `
    <div class="plan-card" id="plan-${plan.id}">
      <div class="plan-header" onclick="togglePlan('${plan.id}')">
        <span class="plan-chevron">▶</span>
        <div class="plan-priority priority-${plan.priority}"></div>
        <div class="plan-info">
          <div class="plan-title">${plan.title}</div>
          <div class="plan-desc">${plan.description}</div>
        </div>
        <div class="plan-stats">
          <div class="plan-progress-wrap">
            <div class="plan-progress-bar"><div class="plan-progress-fill" style="width:${progress}%;background:${progressColor}"></div></div>
            <div class="plan-progress-text" style="color:${progressColor}">${progress}%</div>
          </div>
          <div class="plan-task-count">${doneTasks}/${plan.tasks.length} tasks</div>
          <span class="plan-status status-${status}">${status.replace('_',' ')}</span>
        </div>
      </div>
      <div class="plan-body">
        <div class="task-list">
          <div class="task-group-header">
            <span>Tasks</span>
            <span>${doneTasks} of ${plan.tasks.length} complete</span>
          </div>`;

    tasks.forEach(task => {
      html += `
          <div class="task-item ${task.done ? 'done' : ''}">
            <div class="task-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask('${plan.id}','${task.id}')"></div>
            <div class="task-priority-dot tpd-${task.priority}"></div>
            <div class="task-text">${task.text}</div>
          </div>`;
    });

    html += `
          <div class="add-task-row">
            <input class="add-task-input" id="input-${plan.id}" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTask('${plan.id}')">
            <select class="add-task-select" id="pri-${plan.id}">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
              <option value="critical">Critical</option>
            </select>
            <button class="add-task-btn" onclick="addTask('${plan.id}')">Add</button>
          </div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════

function setFolder(id) {
  activeFolder = id;
  render();
}

function setFilter(f) {
  activeFilter = f;
  renderContent();
  // update filter button states
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().replace(' ','') === f);
  });
}

function togglePlan(planId) {
  const el = document.getElementById('plan-' + planId);
  el.classList.toggle('expanded');
}

function toggleTask(planId, taskId) {
  const plan = plans.find(p => p.id === planId);
  if (!plan) return;
  const task = plan.tasks.find(t => t.id === taskId);
  if (!task) return;
  task.done = !task.done;
  plan.progress = getPlanProgress(plan);
  plan.status = getPlanStatus(plan);
  savePlans();
  render();
  // Re-expand the plan card
  setTimeout(() => {
    const el = document.getElementById('plan-' + planId);
    if (el) el.classList.add('expanded');
  }, 10);
}

function addTask(planId) {
  const input = document.getElementById('input-' + planId);
  const priSelect = document.getElementById('pri-' + planId);
  const text = input.value.trim();
  if (!text) return;
  const plan = plans.find(p => p.id === planId);
  if (!plan) return;
  const id = planId.replace(/[^a-z]/g,'').slice(0,2) + '_' + Date.now();
  plan.tasks.push({ id, text, done: false, priority: priSelect.value });
  savePlans();
  render();
  setTimeout(() => {
    const el = document.getElementById('plan-' + planId);
    if (el) el.classList.add('expanded');
    const newInput = document.getElementById('input-' + planId);
    if (newInput) newInput.focus();
  }, 10);
}

function expandAll() {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.add('expanded'));
}

function collapseAll() {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('expanded'));
}

function exportData() {
  const blob = new Blob([JSON.stringify(plans, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'xiangqi-dashboard-plans.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

loadPlans();
render();
</script>
<script>
// Universal language toggle
(function() {
  let pageLang = localStorage.getItem('pageLang') || 'zh';
  
  window.setPageLang = function(lang) {
    pageLang = lang;
    localStorage.setItem('pageLang', lang);
    document.querySelectorAll('.lt-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.style.background = isActive ? 'rgba(240,192,96,0.9)' : 'rgba(255,255,255,0.08)';
      b.style.color = isActive ? '#1a1d2e' : '#9ca0b8';
      b.style.border = isActive ? 'none' : '1px solid rgba(255,255,255,0.06)';
    });
    applyLang();
  };
  
  function applyLang() {
    document.querySelectorAll('[data-zh][data-en]').forEach(el => {
      if (pageLang === 'zh') el.textContent = el.dataset.zh;
      else if (pageLang === 'en') el.textContent = el.dataset.en;
      else el.textContent = el.dataset.zh + ' ' + el.dataset.en;
    });
  }
  
  // Apply on load
  setTimeout(() => {
    setPageLang(pageLang);
  }, 100);
})();
</script>
