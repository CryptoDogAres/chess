<!DOCTYPE html>
<!--
  OBS Setup:
  - Add as Browser Source
  - Width: 1920, Height: 120
  - Position: bottom of screen (x=0, y=960)
  - Check "Shutdown source when not visible"
  - Accepts moves via postMessage: window.postMessage({ move: { num: 1, piece: '車', notation: '車一進三', eval: '+0.5' } }, '*')
  - Or custom messages: window.postMessage({ message: '精彩！' }, '*')
  - Polls localhost:8080/moves for auto updates (optional)
-->
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    width: 1920px;
    height: 120px;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }

  .ticker-container {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    overflow: hidden;
  }

  .move-card {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(25, 25, 25, 0.9), rgba(40, 40, 40, 0.85));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 8px;
    padding: 8px 16px;
    animation: cardSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    position: relative;
    overflow: hidden;
  }

  .move-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, #ffd700, #ff6b35);
  }

  @keyframes cardSlideIn {
    0% {
      transform: translateX(200px) scale(0.8);
      opacity: 0;
    }
    100% {
      transform: translateX(0) scale(1);
      opacity: 1;
    }
  }

  @keyframes cardFadeOut {
    0% { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(-100px); }
  }

  .move-num {
    font-size: 12px;
    color: rgba(255, 215, 0, 0.6);
    font-weight: 600;
    min-width: 24px;
    text-align: center;
  }

  .move-piece {
    font-size: 24px;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
    line-height: 1;
  }

  .move-notation {
    font-size: 18px;
    color: #fff;
    font-weight: 600;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .move-eval {
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
  }

  .eval-positive {
    background: rgba(76, 175, 80, 0.3);
    color: #81c784;
    border: 1px solid rgba(76, 175, 80, 0.3);
  }

  .eval-negative {
    background: rgba(244, 67, 54, 0.3);
    color: #e57373;
    border: 1px solid rgba(244, 67, 54, 0.3);
  }

  .eval-neutral {
    background: rgba(158, 158, 158, 0.3);
    color: #bdbdbd;
    border: 1px solid rgba(158, 158, 158, 0.3);
  }

  /* Custom message card */
  .message-card {
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(180, 20, 20, 0.85), rgba(120, 10, 10, 0.9));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 215, 0, 0.4);
    border-radius: 8px;
    padding: 10px 24px;
    animation: cardSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards,
               messagePulse 1.5s ease-in-out 0.5s 3;
    position: relative;
  }

  .message-card .text {
    font-size: 22px;
    color: #ffd700;
    font-weight: 700;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
  }

  @keyframes messagePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Subtle base line */
  .base-line {
    position: absolute;
    bottom: 5px;
    left: 20px;
    right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
  }
</style>
</head>
<body>

<div class="ticker-container" id="ticker"></div>
<div class="base-line"></div>

<script>
  const ticker = document.getElementById('ticker');
  const MAX_CARDS = 10;

  function getEvalClass(evalStr) {
    if (!evalStr) return 'eval-neutral';
    const val = parseFloat(evalStr);
    if (isNaN(val)) return 'eval-neutral';
    if (val > 0.2) return 'eval-positive';
    if (val < -0.2) return 'eval-negative';
    return 'eval-neutral';
  }

  function addMoveCard(move) {
    const card = document.createElement('div');
    card.className = 'move-card';

    let html = '';
    if (move.num) html += '<div class="move-num">#' + move.num + '</div>';
    if (move.piece) html += '<div class="move-piece">' + move.piece + '</div>';
    if (move.notation) html += '<div class="move-notation">' + move.notation + '</div>';
    if (move.eval) {
      html += '<div class="move-eval ' + getEvalClass(move.eval) + '">' + move.eval + '</div>';
    }

    card.innerHTML = html;
    ticker.appendChild(card);
    trimCards();
  }

  function addMessageCard(text) {
    const card = document.createElement('div');
    card.className = 'message-card';
    card.innerHTML = '<div class="text">' + text + '</div>';
    ticker.appendChild(card);
    trimCards();

    // Auto-remove message after 8 seconds
    setTimeout(function() {
      card.style.animation = 'cardFadeOut 0.5s ease forwards';
      setTimeout(function() { card.remove(); }, 500);
    }, 8000);
  }

  function trimCards() {
    while (ticker.children.length > MAX_CARDS) {
      const first = ticker.children[0];
      first.style.animation = 'cardFadeOut 0.3s ease forwards';
      setTimeout(function() { first.remove(); }, 300);
    }
  }

  // Accept postMessage API
  window.addEventListener('message', function(e) {
    if (e.data && e.data.move) {
      addMoveCard(e.data.move);
    }
    if (e.data && e.data.message) {
      addMessageCard(e.data.message);
    }
  });

  // URL param for initial message
  const params = new URLSearchParams(window.location.search);
  const initMsg = params.get('message') || params.get('msg');
  if (initMsg) {
    setTimeout(function() { addMessageCard(initMsg); }, 500);
  }

  // Optional: poll for moves from engine
  let lastMoveCount = 0;
  async function pollMoves() {
    try {
      const resp = await fetch('http://localhost:8080/moves');
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.moves && data.moves.length > lastMoveCount) {
          const newMoves = data.moves.slice(lastMoveCount);
          newMoves.forEach(function(m, i) {
            setTimeout(function() { addMoveCard(m); }, i * 300);
          });
          lastMoveCount = data.moves.length;
        }
      }
    } catch (e) {
      // Server not available
    }
  }

  setInterval(pollMoves, 3000);
</script>
</body>
</html>
