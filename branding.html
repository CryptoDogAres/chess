<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1e2130;--surface2:#282b3d;--border:#333652;--text:#e8e8f0;--text2:#9a9bb5;--accent:#e74c3c;--accent2:#f5c542;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:'LXGW WenKai',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;min-height:100vh}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:22px;font-weight:700}
header h1 span{color:var(--accent2);font-weight:400;font-size:16px;margin-left:8px}
.nav-links{display:flex;gap:16px;font-size:14px}
main{max-width:1400px;margin:0 auto;padding:24px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.section h2{font-size:18px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section h2::before{content:'';display:inline-block;width:4px;height:20px;background:var(--accent);border-radius:2px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
.col{flex:1;min-width:250px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input[type="text"],input[type="number"],select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2)}
textarea{resize:vertical;min-height:60px}
.scheme-cards{display:flex;gap:12px;flex-wrap:wrap}
.scheme-card{cursor:pointer;border:2px solid var(--border);border-radius:8px;padding:12px;text-align:center;min-width:140px;transition:all .2s}
.scheme-card.active{border-color:var(--accent2);box-shadow:0 0 12px rgba(245,197,66,.25)}
.scheme-card .colors{display:flex;gap:4px;justify-content:center;margin-bottom:6px}
.scheme-card .colors span{width:24px;height:24px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,.15)}
.scheme-card .name{font-size:13px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#c0392b}
.btn-gold{background:var(--accent2);color:#111}
.btn-gold:hover{background:#d4a62e}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.style-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.style-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.style-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.canvas-wrap{background:#000;border-radius:8px;overflow:hidden;display:inline-block;max-width:100%}
.canvas-wrap canvas{display:block;max-width:100%;height:auto}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.preview-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.preview-card canvas{width:100%;height:auto;display:block}
.preview-card .meta{padding:8px 12px;font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.banner-set{display:flex;flex-direction:column;gap:16px}
.banner-item{display:flex;flex-direction:column;gap:6px}
.banner-item h3{font-size:14px;color:var(--text2)}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.fields-grid label{margin-top:10px}
.fields-grid .full{grid-column:1/-1}
.stars-input{display:flex;gap:4px;margin-top:4px}
.stars-input span{font-size:22px;cursor:pointer;color:var(--border);transition:color .15s}
.stars-input span.on{color:var(--accent2)}
@media(max-width:768px){.row{flex-direction:column}.fields-grid{grid-template-columns:1fr}.preview-grid{grid-template-columns:1fr}}
</style>

<script>
// ==================== DATA ====================
const SCHEMES = [
  {id:'red',   name:'经典红 Classic Red',    primary:'#d4380d', secondary:'#f5c542', bg1:'#1a0a0a', bg2:'#2d1010', text:'#fff', dark:'#0d0505'},
  {id:'blue',  name:'现代蓝 Modern Blue',    primary:'#1890ff', secondary:'#13c2c2', bg1:'#091428', bg2:'#0d1f3c', text:'#fff', dark:'#050e1a'},
  {id:'purple',name:'皇家紫 Royal Purple',   primary:'#722ed1', secondary:'#f5c542', bg1:'#1a0d2e', bg2:'#2a1545', text:'#fff', dark:'#0d0518'}
];

const LOGO_STYLES = ['简约 Minimal','粗体 Bold','圆标 Circle Badge','方印 Square Seal'];
const THUMB_STYLES = [
  {id:0, name:'谜题挑战 Puzzle'},
  {id:1, name:'名局对弈 Famous Game'},
  {id:2, name:'教学入门 Tutorial'},
  {id:3, name:'引擎分析 Engine'},
  {id:4, name:'残局破解 Endgame'},
  {id:5, name:'直播精华 Live Recap'}
];

let currentScheme = SCHEMES[0];
let currentLogoStyle = 0;
let currentThumbStyle = 0;

// Thumbnail editable data
let thumbData = [
  {title:'这步你会走吗？', subtitle:'车马冷着妙手连环', episode:12},
  {title:'胡荣华 VS 杨官璘', subtitle:'1980年全国象棋个人赛 · 经典对局', episode:5, playerL:'胡荣华', playerR:'杨官璘'},
  {title:'开局必学：中炮对屏风马', subtitle:'新手快速入门系列', episode:3, lessonNum:3},
  {title:'AI发现惊天妙手！', subtitle:'引擎深度分析名局关键转折', episode:8, evalScore:'+3.5'},
  {title:'残局破解：车马绝杀', subtitle:'五步之内锁定胜局', episode:22, difficulty:4},
  {title:'直播精华：惊天翻盘局', subtitle:'2026年3月15日 直播回顾', episode:1, liveDate:'2026-03-15'}
];

// ==================== INIT ====================
function init(){
  renderSchemeCards();
  renderLogoTabs();
  renderThumbTabs();
  renderBanners();
  renderAll();
}

function onIdentityChange(){renderAll()}
function getChannel(){return document.getElementById('channelName').value||'棋道 ChessDAO'}
function getTagline(){return document.getElementById('tagline').value||'象棋解说 · 名局分析 · 残局谜题'}
function getLogoChar(){return document.getElementById('logoChar').value||'棋'}

function renderAll(){
  renderLogo();
  renderAllBanners();
  renderThumbEditor();
  renderAllThumbnails();
  renderPreviewGrid();
}

// ==================== SCHEME CARDS ====================
function renderSchemeCards(){
  const c=document.getElementById('schemeCards');
  c.innerHTML='';
  SCHEMES.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='scheme-card'+(s.id===currentScheme.id?' active':'');
    d.innerHTML=`<div class="colors"><span style="background:${s.primary}"></span><span style="background:${s.secondary}"></span><span style="background:${s.bg2}"></span></div><div class="name">${s.name}</div>`;
    d.onclick=()=>{currentScheme=s;renderSchemeCards();renderAll()};
    c.appendChild(d);
  });
}

// ==================== LOGO ====================
function renderLogoTabs(){
  const c=document.getElementById('logoStyleTabs');
  c.innerHTML='';
  LOGO_STYLES.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='style-tab'+(i===currentLogoStyle?' active':'');
    b.textContent=n;
    b.onclick=()=>{currentLogoStyle=i;renderLogoTabs();renderLogo()};
    c.appendChild(b);
  });
}

function renderLogo(){
  const cv=document.getElementById('logoCanvas');
  const ctx=cv.getContext('2d');
  const W=512,s=currentScheme,ch=getLogoChar(),name=getChannel();
  const rounded=document.getElementById('logoRounded').checked;
  ctx.clearRect(0,0,W,W);
  ctx.save();
  if(rounded){roundedClip(ctx,0,0,W,W,60)}

  // Background gradient
  const g=ctx.createLinearGradient(0,0,W,W);
  g.addColorStop(0,s.bg1);g.addColorStop(1,s.bg2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,W);

  if(currentLogoStyle===0){
    // Minimal
    ctx.fillStyle=s.primary;
    ctx.font='bold 200px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ch,W/2,W/2-30);
    ctx.fillStyle=s.secondary;
    ctx.font='bold 36px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.fillText(name,W/2,W/2+120);
  } else if(currentLogoStyle===1){
    // Bold
    const g2=ctx.createLinearGradient(0,100,0,350);
    g2.addColorStop(0,s.primary);g2.addColorStop(1,s.secondary);
    ctx.fillStyle=g2;
    ctx.font='900 240px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=s.primary;ctx.shadowBlur=30;
    ctx.fillText(ch,W/2,W/2-30);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.font='bold 38px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.fillText(name,W/2,W/2+130);
  } else if(currentLogoStyle===2){
    // Circle Badge
    ctx.beginPath();ctx.arc(W/2,W/2-10,190,0,Math.PI*2);
    ctx.strokeStyle=s.secondary;ctx.lineWidth=6;ctx.stroke();
    ctx.beginPath();ctx.arc(W/2,W/2-10,175,0,Math.PI*2);
    ctx.strokeStyle=s.primary;ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle=s.secondary;
    ctx.font='bold 160px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ch,W/2,W/2-20);
    ctx.fillStyle=s.text;
    ctx.font='bold 28px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.fillText(name,W/2,W/2+210);
  } else if(currentLogoStyle===3){
    // Square Seal 印章
    const pad=60;
    ctx.fillStyle=s.primary;
    roundedRect(ctx,pad,pad-20,W-pad*2,W-pad*2-20,12);ctx.fill();
    // Inner border
    ctx.strokeStyle=s.bg1;ctx.lineWidth=4;
    roundedRect(ctx,pad+12,pad-8,W-pad*2-24,W-pad*2-44,6);ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='bold 180px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ch,W/2,W/2-30);
    ctx.fillStyle=s.secondary;
    ctx.font='bold 30px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';
    ctx.fillText(name,W/2,W/2+130);
  }

  ctx.restore();
}

// ==================== BANNERS ====================
function renderBanners(){
  const set=document.getElementById('bannerSet');
  const banners=[
    {id:'yt',  label:'YouTube 横幅 (2560×1440)', w:2560, h:1440},
    {id:'bili', label:'Bilibili 横幅 (2120×340)', w:2120, h:340},
    {id:'dy',  label:'抖音头像预览 (800×800)', w:800, h:800}
  ];
  set.innerHTML='';
  banners.forEach(b=>{
    const item=document.createElement('div');
    item.className='banner-item';
    // Display scale
    const scale=Math.min(1, 700/b.w);
    item.innerHTML=`<h3>${b.label}</h3><div class="canvas-wrap"><canvas id="banner_${b.id}" width="${b.w}" height="${b.h}" style="max-width:700px"></canvas></div><div class="btn-group"><button class="btn btn-gold btn-sm" onclick="downloadCanvas('banner_${b.id}','banner_${b.id}.png')">下载 PNG</button></div>`;
    set.appendChild(item);
  });
}

function renderAllBanners(){
  renderBannerYT();
  renderBannerBili();
  renderBannerDY();
}

function drawXiangqiPieces(ctx, x, y, size, scheme, count){
  // Draw decorative xiangqi piece silhouettes
  const pieces=['車','馬','炮','兵','將','士','象'];
  for(let i=0;i<count;i++){
    const px=x+i*(size+20);
    ctx.save();
    ctx.globalAlpha=0.12;
    ctx.beginPath();ctx.arc(px,y,size/2,0,Math.PI*2);
    ctx.fillStyle=scheme.secondary;ctx.fill();
    ctx.globalAlpha=0.18;
    ctx.fillStyle=scheme.text;
    ctx.font=`bold ${size*0.6}px "PingFang SC","Noto Sans SC",sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pieces[i%pieces.length],px,y);
    ctx.restore();
  }
}

function drawBoardPattern(ctx, x, y, w, h, scheme, alpha){
  ctx.save();
  ctx.globalAlpha=alpha||0.08;
  ctx.strokeStyle=scheme.secondary;
  ctx.lineWidth=1;
  const cols=9,rows=10;
  const cw=w/(cols-1), ch2=h/(rows-1);
  for(let r=0;r<rows;r++){ctx.beginPath();ctx.moveTo(x,y+r*ch2);ctx.lineTo(x+w,y+r*ch2);ctx.stroke()}
  for(let c=0;c<cols;c++){ctx.beginPath();ctx.moveTo(x+c*cw,y);ctx.lineTo(x+c*cw,y+h);ctx.stroke()}
  // River
  ctx.globalAlpha=(alpha||0.08)*1.5;
  ctx.fillStyle=scheme.primary;
  ctx.font=`bold ${ch2*0.6}px "PingFang SC",sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const ry=y+4.5*ch2;
  ctx.fillText('楚 河',x+w*0.25,ry);
  ctx.fillText('漢 界',x+w*0.75,ry);
  ctx.restore();
}

function renderBannerYT(){
  const cv=document.getElementById('banner_yt');if(!cv)return;
  const ctx=cv.getContext('2d'),W=2560,H=1440,s=currentScheme;
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,s.bg1);g.addColorStop(0.5,s.bg2);g.addColorStop(1,s.dark);

// ==================== THUMBNAIL RENDERERS ====================
function renderThumbnail(cv, styleIdx){
  const ctx=cv.getContext('2d'),W=1280,H=720,s=currentScheme,d=thumbData[styleIdx];
  ctx.clearRect(0,0,W,H);

  switch(styleIdx){
    case 0: renderThumb_Puzzle(ctx,W,H,s,d); break;
    case 1: renderThumb_FamousGame(ctx,W,H,s,d); break;
    case 2: renderThumb_Tutorial(ctx,W,H,s,d); break;
    case 3: renderThumb_Engine(ctx,W,H,s,d); break;
    case 4: renderThumb_Endgame(ctx,W,H,s,d); break;
    case 5: renderThumb_LiveRecap(ctx,W,H,s,d); break;
  }
}

function renderThumb_Puzzle(ctx,W,H,s,d){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,s.bg1);g.addColorStop(1,s.bg2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Board
  drawBoardPattern(ctx,W*0.05,H*0.05,W*0.9,H*0.6,s,0.15);
  drawRandomPieces(ctx,W*0.05,H*0.05,W*0.9,H*0.6,s);

  // Dark overlay on board for text
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,W,H*0.5);

  // Title text
  drawTextWithStroke(ctx,d.title,W/2,H*0.3,'bold 82px "PingFang SC","Noto Sans SC",sans-serif','#fff',s.primary,4);

  // Bottom gradient bar
  const gb=ctx.createLinearGradient(0,H*0.75,0,H);
  gb.addColorStop(0,s.primary);gb.addColorStop(1,s.secondary);
  ctx.fillStyle=gb;ctx.fillRect(0,H*0.78,W,H*0.22);

  ctx.font='22px "PingFang SC",sans-serif';

  ctx.fillText(getChannel(),30,H*0.86);

function delay(ms){return new Promise(r=>setTimeout(r,ms))}

async function delayedDownload(cv,name,ms){
  await delay(ms);
  const a=document.createElement('a');
  a.href=cv.toDataURL('image/png');
  a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function roundedClip(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.clip();
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawTextWithStroke(ctx,text,x,y,font,fill,stroke,lw){
  ctx.save();
  ctx.font=font;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.lineWidth=lw||3;ctx.strokeStyle=stroke||'#000';ctx.lineJoin='round';
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=10;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;
  ctx.strokeText(text,x,y);
  ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  ctx.fillStyle=fill||'#fff';
  ctx.fillText(text,x,y);
  ctx.restore();
}

function drawBadge(ctx,x,y,text,s){
  ctx.save();
  ctx.fillStyle=s.secondary;
  const m=ctx.measureText||null;
  ctx.font='bold 22px "PingFang SC",sans-serif';
  const tw=ctx.measureText(text).width;
  roundedRect(ctx,x-tw/2-14,y-16,tw+28,36,18);ctx.fill();
  ctx.fillStyle='#111';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y+1);
  ctx.restore();
}

function drawRandomPieces(ctx,bx,by,bw,bh,s){
  // Draw some representative xiangqi pieces on the board
  const positions=[
    {col:4,row:0,text:'將',red:false},{col:4,row:9,text:'帥',red:true},
    {col:1,row:0,text:'馬',red:false},{col:7,row:9,text:'馬',red:true},
    {col:0,row:0,text:'車',red:false},{col:0,row:9,text:'車',red:true},
    {col:4,row:3,text:'兵',red:true},{col:2,row:6,text:'卒',red:false},
    {col:1,row:7,text:'炮',red:true},{col:7,row:2,text:'炮',red:false},
    {col:3,row:9,text:'士',red:true},{col:5,row:0,text:'士',red:false},
  ];
  const cw=bw/8, ch=bh/9;
  ctx.save();
  positions.forEach(p=>{
    const px=bx+p.col*cw;
    const py=by+p.row*ch;
    const r=Math.min(cw,ch)*0.38;
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=p.red?'rgba(180,40,20,0.7)':'rgba(30,30,30,0.8)';
    ctx.fill();
    ctx.strokeStyle=p.red?'rgba(220,80,50,0.8)':'rgba(120,120,120,0.7)';
    ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=p.red?'#fff':'rgba(200,200,200,0.9)';
    ctx.font=`bold ${r*1.1}px "PingFang SC","Noto Sans SC",sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.text,px,py);
  });
  ctx.restore();
}

function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ==================== BOOT ====================
window.addEventListener('DOMContentLoaded', init);
</script>
<script>
// Universal language toggle
(function() {
  let pageLang = localStorage.getItem('pageLang') || 'zh';
  
  window.setPageLang = function(lang) {
    pageLang = lang;
    localStorage.setItem('pageLang', lang);
    document.querySelectorAll('.lt-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.style.background = isActive ? 'rgba(240,192,96,0.9)' : 'rgba(255,255,255,0.08)';
      b.style.color = isActive ? '#1a1d2e' : '#9ca0b8';
      b.style.border = isActive ? 'none' : '1px solid rgba(255,255,255,0.06)';
    });
    applyLang();
  };
  
  function applyLang() {
    document.querySelectorAll('[data-zh][data-en]').forEach(el => {
      if (pageLang === 'zh') el.textContent = el.dataset.zh;
      else if (pageLang === 'en') el.textContent = el.dataset.en;
      else el.textContent = el.dataset.zh + ' ' + el.dataset.en;
    });
  }
  
  // Apply on load
  setTimeout(() => {
    setPageLang(pageLang);
  }, 100);
})();
</script>
